<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task-Switching Auditivo</title>
    <link rel="stylesheet" href="src/css/style.css">
</head>
<body>
    <div id="app">
        <div id="screen-container"></div>
    </div>

    <!-- Tela de Teste de Áudio -->
    <template id="audio-test-template">
        <div class="screen-container">
            <h2 class="title" style="font-size: 2.2rem;">Teste de Áudio</h2>
            <p style="margin-bottom: 20px; font-size: 1.1rem;">Clique no botão para ouvir e selecione os <strong>3 números</strong> ditos abaixo:</p>
            
            <button id="btn-play-test" class="btn-action" style="background: var(--border-color); color: var(--text-light); padding: 10px 30px; font-size: 1rem; margin: 0 auto 15px auto;">▶ Reproduzir Áudio</button>
            
            <div id="audio-options" class="options-grid"></div>
            <p id="audio-test-feedback" style="font-weight: bold; min-height: 24px;"></p>
            
            <div style="margin-top: 25px; width: 100%;">
                <button id="btn-start-instructions" class="btn-main hidden" style="background: var(--cyan); color: #000;">TUDO CERTO! VER INSTRUÇÕES (ESPAÇO)</button>
            </div>
        </div>
    </template>

    <template id="stage1-instr-template">
        <div class="screen-container">
            <h2 class="title">Treino 1 - Task-Switching Auditivo</h2>
            <div class="instructions-content" style="text-align: left;">
                <p style="text-align: center;">Para a primeira etapa do teste você escutará uma voz MASCULINA falar uma série de números, um de cada vez.</p>
                <p style="text-align: center; margin-bottom: 20px;">Sua tarefa é decidir o mais rápido possível se este número é <strong>PAR</strong> ou <strong>ÍMPAR</strong>.</p>
                
                <div class="keys-info">
                    <div>
                        <p>Pressione a tecla</p>
                        <kbd>A</kbd>
                        <p>para <strong>PAR</strong></p>
                    </div>
                    <div>
                        <p>Pressione a tecla</p>
                        <kbd>L</kbd>
                        <p>para <strong>ÍMPAR</strong></p>
                    </div>
                </div>

                <div class="important-section">
                    <h3>⚠️ IMPORTANTE</h3>
                    <ul style="list-style: none; padding: 0; max-width: 480px; margin: 0 auto; text-align: center; color: var(--text-secondary); font-size: 0.95rem;">
                        <li style="margin-bottom: 8px;"><strong style="color: var(--text-light);">Responda da forma mais rápida e precisa que conseguir.</strong></li>
                        <li style="margin-bottom: 8px;"><strong style="color: var(--text-light);">Se você errar, um sinal sonoro irá soar.</strong></li>
                        <li><strong style="color: var(--text-light);">Simplesmente corrija a sua resposta e continue o teste.</strong></li>
                    </ul>
                </div>
            </div>
            <div class="start-prompt">
                <button class="btn-main" id="btn-start-stage">ESTOU PRONTO (ESPAÇO)</button>
            </div>
        </div>
    </template>

    <template id="stage2-instr-template">
        <div class="screen-container">
            <h2 class="title">Treino 2 - Task-Switching Auditivo</h2>
            <div class="instructions-content" style="text-align: left;">
                <p style="text-align: center;">Para a próxima etapa do teste você escutará uma voz FEMININA falar uma série de números, um de cada vez.</p>
                <p style="text-align: center; margin-bottom: 20px;">Sua tarefa é decidir se o número é <strong>MENOR</strong> ou <strong>MAIOR</strong> que 5.</p>
                
                <div class="keys-info">
                    <div>
                        <p>Pressione a tecla</p>
                        <kbd>A</kbd>
                        <p>se <strong>MENOR &lt; 5</strong></p>
                    </div>
                    <div>
                        <p>Pressione a tecla</p>
                        <kbd>L</kbd>
                        <p>se <strong>MAIOR &gt; 5</strong></p>
                    </div>
                </div>

                <div class="important-section">
                    <h3>⚠️ IMPORTANTE</h3>
                    <ul style="list-style: none; padding: 0; max-width: 480px; margin: 0 auto; text-align: center; color: var(--text-secondary); font-size: 0.95rem;">
                        <li style="margin-bottom: 8px;"><strong style="color: var(--text-light);">Responda da forma mais rápida e precisa que conseguir.</strong></li>
                        <li style="margin-bottom: 8px;"><strong style="color: var(--text-light);">Se você errar, um sinal sonoro irá soar.</strong></li>
                        <li><strong style="color: var(--text-light);">Simplesmente corrija a sua resposta e continue o teste.</strong></li>
                    </ul>
                </div>
            </div>
            <div class="start-prompt">
                <button class="btn-main" id="btn-start-stage">ESTOU PRONTO (ESPAÇO)</button>
            </div>
        </div>
    </template>

    <template id="stage3-instr-template">
        <div class="screen-container">
            <h2 class="title">Treino 3 - Task-Switching Auditivo</h2>
            <div class="instructions-content" style="text-align: left;">
                <p style="text-align: center; margin-bottom: 20px;">Agora vamos combinar as duas tarefas em uma:</p>
                
                <div style="display: flex; justify-content: center; gap: 20px; margin-bottom: 20px;">
                    <div style="background: var(--bg-secondary); padding: 15px; border-radius: 12px; border: 1px solid var(--border-color); width: 45%; text-align: center;">
                        <span style="color: var(--cyan); font-weight: bold; display: block; margin-bottom: 5px;">VOZ MASCULINA</span>
                        Classifique entre<br><strong>PAR</strong> ou <strong>ÍMPAR</strong>
                    </div>
                    <div style="background: var(--bg-secondary); padding: 15px; border-radius: 12px; border: 1px solid var(--border-color); width: 45%; text-align: center;">
                        <span style="color: #f472b6; font-weight: bold; display: block; margin-bottom: 5px;">VOZ FEMININA</span>
                        Classifique entre<br><strong>MENOR</strong> ou <strong>MAIOR</strong> que 5
                    </div>
                </div>

                <div class="keys-info">
                    <div>
                        <p>Pressione a tecla</p>
                        <kbd>A</kbd>
                        <p><strong>PAR</strong> ou <strong>&lt; 5</strong></p>
                    </div>
                    <div>
                        <p>Pressione a tecla</p>
                        <kbd>L</kbd>
                        <p><strong>ÍMPAR</strong> ou <strong>&gt; 5</strong></p>
                    </div>
                </div>

                <div class="important-section">
                    <h3>⚠️ IMPORTANTE</h3>
                    <ul style="list-style: none; padding: 0; max-width: 480px; margin: 0 auto; text-align: center; color: var(--text-secondary); font-size: 0.95rem;">
                        <li style="margin-bottom: 8px;"><strong style="color: var(--text-light);">Responda da forma mais rápida e precisa que conseguir.</strong></li>
                        <li style="margin-bottom: 8px;"><strong style="color: var(--text-light);">Se você errar, um sinal sonoro irá soar.</strong></li>
                        <li><strong style="color: var(--text-light);">Simplesmente corrija a sua resposta e continue o teste.</strong></li>
                    </ul>
                </div>
            </div>
            <div class="start-prompt">
                <button class="btn-main" id="btn-start-stage">ESTOU PRONTO (ESPAÇO)</button>
            </div>
        </div>
    </template>

    <template id="positioning-template">
        <div class="screen-container" style="justify-content: center;">
            <!-- Título adicionado aqui -->
            <h2 class="title">Preparação</h2>
            
            <p style="font-size: 1.3rem; margin-bottom: 2rem;">
                Posicione seu indicador esquerdo sobre a tecla <kbd>A</kbd><br>e o direito sobre a tecla <kbd>L</kbd>
            </p>
            <div class="keys-info" style="margin-top: 0; margin-bottom: 2rem;">
                <div><kbd>A</kbd><p style="margin-top: 10px;">Mão <strong>Esquerda</strong></p></div>
                <div><kbd>L</kbd><p style="margin-top: 10px;">Mão <strong>Direita</strong></p></div>
            </div>
            <div class="start-prompt">
                <button class="btn-main" id="btn-start-stage">COMEÇAR ETAPA DE TREINO (ESPAÇO)</button>
            </div>
        </div>
    </template>

    <template id="oficial-transition-template">
        <div class="screen-container">
            <h2 class="title">Treino Concluído</h2>
            <div class="instructions-content" style="text-align: center;">
                <p style="font-size: 1.1rem; margin-bottom: 30px;">Agora começa o <strong>teste oficial</strong> desta etapa.<br>As regras são exatamente as mesmas do treino.</p>
                
                <div class="keys-info">
                    <div id="transition-key-a-container"></div>
                    <div id="transition-key-l-container"></div>
                </div>
            </div>
            <div class="start-prompt">
                <button class="btn-main" id="btn-start-stage">COMEÇAR ETAPA OFICIAL (ESPAÇO)</button>
            </div>
        </div>
    </template>

    <audio id="audio-error" src="src/audio/error.mp3"></audio>
    <script src="src/js/script.js"></script>
</body>
</html>
